<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VividMedi - Clinical AI Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-dark text-white">
  <div class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="border-b border-primary/10 bg-secondary/50 backdrop-blur-xl sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-primary to-cyan-500 rounded-lg flex items-center justify-center font-bold text-lg">V</div>
          <div>
            <h1 class="gradient-text text-2xl font-black">VividMedi</h1>
            <p class="text-xs text-gray-400">Clinical Intelligence</p>
          </div>
        </div>
        
        <div class="flex items-center gap-4">
          <button id="themeToggle" class="p-2 hover:bg-primary/10 rounded-lg transition">🌙</button>
          <div id="authSection" class="flex gap-2"></div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-12">
      <!-- User Info -->
      <div id="userInfo" class="mb-8 p-4 bg-secondary rounded-lg border border-primary/10">
        <p class="text-sm text-gray-400">Logged in as: <span id="userEmail" class="text-primary font-semibold">Guest</span></p>
        <p class="text-xs text-gray-500 mt-1">Remaining: <span id="userRemaining" class="text-primary">10</span> queries</p>
      </div>

      <!-- Grid Layout -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <!-- Clinical Question Card -->
        <div class="card">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold">💡 Clinical Question</h2>
            <button id="clearClinicalBtn" class="text-gray-400 hover:text-primary transition">✕</button>
          </div>
          <textarea id="clinicalInput" class="input-base mb-4 h-48" placeholder="Ask a clinical question, describe symptoms, or paste exam findings..."></textarea>
          <button id="generateBtn" class="w-full btn-primary">Generate Answer</button>
        </div>

        <!-- Answer Card -->
        <div class="card">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold">📋 Answer</h2>
            <div class="flex gap-2">
              <button id="copyAnswerBtn" class="text-gray-400 hover:text-primary transition" title="Copy" disabled>📋</button>
              <button id="saveAnswerBtn" class="text-gray-400 hover:text-primary transition" title="Save" disabled>💾</button>
            </div>
          </div>
          <div id="answerDisplay" class="h-48 overflow-y-auto bg-dark/50 rounded-lg p-4 border border-primary/10 text-sm leading-relaxed">
            <p class="text-gray-500 text-center mt-20">Generate an answer to see results here</p>
          </div>
        </div>
      </div>

      <!-- Consultation Card -->
      <div class="card">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold">🎙️ Consultation Notes</h2>
          <button id="clearConsultBtn" class="text-gray-400 hover:text-primary transition">✕</button>
        </div>

        <!-- Upload & Input -->
        <div class="mb-4">
          <label for="uploadAudio" class="btn-primary inline-block mb-4 cursor-pointer">📁 Upload Call Recording</label>
          <input id="uploadAudio" type="file" accept="audio/*" class="hidden">
          <div id="uploadStatus" class="text-sm text-gray-400 mb-4"></div>
        </div>

        <textarea id="consultInput" class="input-base mb-4 h-32" placeholder="Or paste raw consultation notes here..."></textarea>

        <!-- Output Type Selector -->
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2">📝 Note Type</label>
          <select id="outputTypeSelect" class="input-base">
            <option value="weight_management_followup">Weight Management Follow-up (DVA)</option>
            <option value="initial_weight_management">Initial Weight Management (DVA)</option>
            <option value="general_telehealth">General Telehealth</option>
          </select>
        </div>

        <!-- Generate Button -->
        <button id="generateConsultBtn" class="w-full btn-primary mb-6">Generate Clinical Note</button>

        <!-- Output -->
        <div>
          <h3 class="font-bold mb-2">Generated Note</h3>
          <div id="consultDisplay" class="h-64 overflow-y-auto bg-dark/50 rounded-lg p-4 border border-primary/10 text-sm leading-relaxed font-mono">
            <p class="text-gray-500 text-center mt-28">Note will appear here</p>
          </div>
          <div class="flex gap-2 mt-4">
            <button id="copyConsultBtn" class="flex-1 btn-secondary" disabled>📋 Copy Note</button>
            <button id="saveConsultBtn" class="flex-1 btn-secondary" disabled>💾 Save</button>
          </div>
        </div>
      </div>

      <!-- Performance Dashboard Link -->
      <div class="mt-12 text-center">
        <a href="/dashboard" class="text-primary hover:underline text-sm">📊 View Performance Metrics</a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-primary/10 bg-secondary/30 py-6 mt-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-400">
        <p>VividMedi © 2024 • Clinical AI for Australian Healthcare</p>
      </div>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const GOOGLE_CLIENT_ID = "{{ google_client_id }}";

    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const theme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    themeToggle.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
    });

    // Google Sign-In
    function handleCredentialResponse(response) {
      fetch('/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      })
      .then(res => res.json())
      .then(data => {
        if (data.ok) {
          localStorage.setItem('auth_token', data.token);
          updateUserInfo();
        } else {
          alert('Login failed: ' + data.error);
        }
      });
    }

    window.onload = () => {
      if (GOOGLE_CLIENT_ID) {
        google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
        google.accounts.id.renderButton(document.getElementById('authSection'), { theme: 'dark', size: 'medium' });
      }
      updateUserInfo();
    };

    // Update user info
    async function updateUserInfo() {
      const res = await fetch('/api/me');
      const data = await res.json();
      document.getElementById('userEmail').textContent = data.email || 'Guest';
      document.getElementById('userRemaining').textContent = data.remaining || data.limit;
    }

    // Clinical Generation
    document.getElementById('generateBtn').addEventListener('click', async () => {
      const input = document.getElementById('clinicalInput').value.trim();
      if (!input) { alert('Enter a question'); return; }
      
      document.getElementById('answerDisplay').innerHTML = '<p class="text-center text-primary">⏳ Generating...</p>';
      
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: input })
        });
        const data = await res.json();
        document.getElementById('answerDisplay').innerHTML = data.answer || 'No response';
        document.getElementById('clinicalInput').value = '';
        updateUserInfo();
      } catch (e) {
        document.getElementById('answerDisplay').innerHTML = '<p class="text-red-400">Error: ' + e.message + '</p>';
      }
    });

    // Consultation Generation
    document.getElementById('generateConsultBtn').addEventListener('click', async () => {
      const input = document.getElementById('consultInput').value.trim();
      if (!input) { alert('Enter consultation data'); return; }
      
      document.getElementById('consultDisplay').innerHTML = '<p class="text-center text-primary">⏳ Generating note...</p>';
      
      try {
        const res = await fetch('/api/consult', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: input, mode: document.getElementById('outputTypeSelect').value })
        });
        const data = await res.json();
        document.getElementById('consultDisplay').innerHTML = data.answer || 'No response';
        document.getElementById('consultInput').value = '';
        document.getElementById('copyConsultBtn').disabled = false;
        updateUserInfo();
      } catch (e) {
        document.getElementById('consultDisplay').innerHTML = '<p class="text-red-400">Error: ' + e.message + '</p>';
      }
    });

    // Copy buttons
    document.getElementById('copyAnswerBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('answerDisplay').innerText);
      alert('Copied!');
    });

    document.getElementById('copyConsultBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('consultDisplay').innerText);
      alert('Copied!');
    });

    // File upload
    document.getElementById('uploadAudio').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      document.getElementById('uploadStatus').textContent = '🔄 Transcribing...';
      const formData = new FormData();
      formData.append('audio', file);
      
      try {
        const res = await fetch('/api/transcribe', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.text) {
          document.getElementById('consultInput').value = data.text;
          document.getElementById('uploadStatus').textContent = '✅ Ready to generate';
        }
      } catch (e) {
        document.getElementById('uploadStatus').textContent = '❌ Error: ' + e.message;
      }
    });

    // Clear buttons
    document.getElementById('clearClinicalBtn').addEventListener('click', () => {
      document.getElementById('clinicalInput').value = '';
      document.getElementById('answerDisplay').innerHTML = '<p class="text-gray-500 text-center mt-20">Generate an answer to see results here</p>';
    });

    document.getElementById('clearConsultBtn').addEventListener('click', () => {
      document.getElementById('consultInput').value = '';
      document.getElementById('consultDisplay').innerHTML = '<p class="text-gray-500 text-center mt-28">Note will appear here</p>';
    });
  </script>
</body>
</html>
