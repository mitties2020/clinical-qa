<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VividMedi - Clinical AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="app-root">
  <div class="shell">
    <div class="layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <div class="vm-logo"></div>
            <div class="brand-text">
              <div class="brand-title">VividMedi</div>
              <div class="brand-subtitle">Clinical Intelligence</div>
            </div>
          </div>
          <input id="sidebarSearch" class="search-input" type="text" placeholder="Search saved..." />
        </div>

        <div class="sidebar-section">
          <div class="section-label">Clinical Questions</div>
          <div id="savedQuestions" class="saved-list"></div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Consultation Notes</div>
          <div id="savedConsults" class="saved-list"></div>
        </div>

        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-email">michael.addis101@gmail.com</div>
            <div class="user-plan">PRO • Unlimited</div>
          </div>
          <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>
      </aside>

      <!-- MAIN -->
      <div class="main-content">
        <header class="header">
          <h1 class="header-title">VividMedi</h1>
          <div class="header-actions">
            <button id="themeToggle" class="btn-theme" title="Dark/Light">🌙</button>
          </div>
        </header>

        <main class="workspace">
          <!-- ROW 1: Clinical Question + Answer -->
          <div class="grid-row">
            <!-- CLINICAL QUESTION -->
            <section class="card input-card">
              <div class="card-header">
                <h2>Clinical Question</h2>
                <button class="btn-clear" id="clearClinicalBtn" title="Clear">✕</button>
              </div>
              <textarea id="clinicalInput" class="input-area" placeholder="Paste clinical notes, exam findings, or ask a question..." rows="9"></textarea>
              <div class="card-footer">
                <button id="generateBtn" class="btn-primary">Generate</button>
                <span class="hint">Press Enter ⏎</span>
              </div>
            </section>

            <!-- ANSWER -->
            <section class="card answer-card">
              <div class="card-header">
                <h2>Answer</h2>
                <div class="header-buttons">
                  <button id="copyAnswerBtn" class="btn-icon" title="Copy">📋</button>
                  <button id="saveAnswerBtn" class="btn-icon" title="Save">💾</button>
                </div>
              </div>
              <div class="answer-content">
                <div id="answerDisplay" class="answer-display">
                  <div class="placeholder">Generate an answer to see results here</div>
                </div>
              </div>
            </section>
          </div>

          <!-- ROW 2: Consultation -->
          <section class="card consult-card">
            <div class="card-header">
              <h2>Consultation Data Input</h2>
              <button class="btn-clear" id="clearConsultBtn" title="Clear">✕</button>
            </div>

            <div class="control-group">
              <label>Smart Device</label>
              <select id="deviceSelect" class="control-select">
                <option value="">Connect Smart Device</option>
                <option value="glasses">AI Glasses</option>
                <option value="ring">AI Ring</option>
                <option value="watch">Smart Watch</option>
                <option value="headset">Headset</option>
              </select>
            </div>

            <textarea id="consultInput" class="input-area" placeholder="Paste raw dictation or consultation notes..." rows="8"></textarea>

            <div class="card-footer">
              <button id="generateConsultBtn" class="btn-primary">Generate</button>
              <span class="hint">Press Enter ⏎</span>
            </div>

            <div class="divider"></div>

            <div class="control-group">
              <label>Output Type</label>
              <select id="outputTypeSelect" class="control-select">
                <option value="consult_note">Initial Consultation</option>
                <option value="medical_review">Medical Review</option>
                <option value="discharge">Discharge Summary</option>
                <option value="referral">Referral Letter</option>
                <option value="dva">DVA Assessment</option>
                <option value="handover">Handover Note</option>
              </select>
            </div>

            <div class="output-label">Output</div>
            <div class="answer-content">
              <div id="consultDisplay" class="answer-display">
                <div class="placeholder">Output will appear here</div>
              </div>
            </div>

            <div class="card-footer">
              <button id="copyConsultBtn" class="btn-icon" title="Copy">📋</button>
              <button id="saveConsultBtn" class="btn-icon" title="Save">💾</button>
              <button id="clearConsultOutputBtn" class="btn-icon" title="Clear">✕</button>
            </div>
          </section>
        </main>
      </div>
    </div>
  </div>
</div>

<script>
// ===== Theme =====
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;
const theme = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', theme);

themeToggle.addEventListener('click', () => {
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
});

// ===== Logout =====
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', { method: 'POST' });
  localStorage.removeItem('auth_token');
  window.location.reload();
});

// ===== Smart Response Parser =====
function detectStructuredResponse(text) {
  const keywords = ['Summary', 'Assessment', 'Diagnosis', 'Investigations', 'Treatment', 'Monitoring', 'Follow-up', 'Red Flag'];
  return keywords.some(kw => text.includes(kw + ':') || text.includes(`**${kw}**`));
}

function parseStructuredResponse(text) {
  // Remove asterisks
  text = text.replace(/\*\*([^*]+)\*\*/g, '$1');
  
  const sections = [];
  const lines = text.split('\n');
  let currentSection = null;
  let currentContent = [];

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;

    // Check if line is a section header
    if (/^(Summary|Assessment|Diagnosis|Investigations|Treatment|Monitoring|Follow-up|Red Flags?|References?):?$/.test(trimmed)) {
      if (currentSection) {
        sections.push({ title: currentSection, content: currentContent.join('\n').trim() });
      }
      currentSection = trimmed.replace(/:$/, '');
      currentContent = [];
    } else if (currentSection) {
      currentContent.push(trimmed);
    }
  }

  if (currentSection && currentContent.length) {
    sections.push({ title: currentSection, content: currentContent.join('\n').trim() });
  }

  return sections;
}

function renderStructuredResponse(sections) {
  if (!sections || sections.length === 0) return '<div class="placeholder">No structured sections found</div>';

  let html = '';
  sections.forEach((sec, idx) => {
    const isOpen = idx === 0; // First section always open
    html += `
      <div class="answer-section ${isOpen ? 'open' : ''}">
        <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="section-title">${sec.title}</span>
          <span class="expand-icon">▼</span>
          <button class="btn-copy-section" onclick="copySectionText(event, '${sec.title}')">📋</button>
        </div>
        <div class="section-body">${sec.content.replace(/\n/g, '<br>')}</div>
      </div>
    `;
  });
  return html;
}

function renderSimpleResponse(text) {
  return `<div class="answer-simple">${text.replace(/\n/g, '<br>')}</div>`;
}

window.copySectionText = function(e, title) {
  e.stopPropagation();
  const section = e.target.closest('.answer-section');
  const text = section.querySelector('.section-body').textContent;
  navigator.clipboard.writeText(text);
  alert('Copied!');
};

// ===== Clinical Generation =====
const clinicalInput = document.getElementById('clinicalInput');
const generateBtn = document.getElementById('generateBtn');
const answerDisplay = document.getElementById('answerDisplay');
const copyAnswerBtn = document.getElementById('copyAnswerBtn');
const saveAnswerBtn = document.getElementById('saveAnswerBtn');
const clearClinicalBtn = document.getElementById('clearClinicalBtn');

clearClinicalBtn.addEventListener('click', () => {
  clinicalInput.value = '';
  answerDisplay.innerHTML = '<div class="placeholder">Generate an answer to see results here</div>';
});

async function generateClinical() {
  const input = clinicalInput.value.trim();
  if (!input) return;

  generateBtn.disabled = true;
  answerDisplay.innerHTML = '<div class="loading">Generating...</div>';

  try {
    const token = localStorage.getItem('auth_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers,
      body: JSON.stringify({ query: input, mode: 'clinical' })
    });

    const data = await res.json();

    if (data.answer) {
      const isStructured = detectStructuredResponse(data.answer);
      if (isStructured) {
        const sections = parseStructuredResponse(data.answer);
        answerDisplay.innerHTML = renderStructuredResponse(sections);
      } else {
        answerDisplay.innerHTML = renderSimpleResponse(data.answer);
      }
      copyAnswerBtn.disabled = false;
      saveAnswerBtn.disabled = false;
    } else {
      answerDisplay.innerHTML = `<div class="error">${data.error || 'Generation failed'}</div>`;
    }
  } catch (e) {
    answerDisplay.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  } finally {
    generateBtn.disabled = false;
  }
}

generateBtn.addEventListener('click', generateClinical);
clinicalInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generateClinical();
  }
});

copyAnswerBtn.addEventListener('click', () => {
  const text = answerDisplay.innerText;
  navigator.clipboard.writeText(text);
  alert('Copied!');
});

// ===== Consultation Generation =====
const consultInput = document.getElementById('consultInput');
const generateConsultBtn = document.getElementById('generateConsultBtn');
const consultDisplay = document.getElementById('consultDisplay');
const outputTypeSelect = document.getElementById('outputTypeSelect');
const copyConsultBtn = document.getElementById('copyConsultBtn');
const saveConsultBtn = document.getElementById('saveConsultBtn');
const clearConsultBtn = document.getElementById('clearConsultBtn');
const clearConsultOutputBtn = document.getElementById('clearConsultOutputBtn');

clearConsultBtn.addEventListener('click', () => {
  consultInput.value = '';
});

clearConsultOutputBtn.addEventListener('click', () => {
  consultDisplay.innerHTML = '<div class="placeholder">Output will appear here</div>';
});

async function generateConsult() {
  const input = consultInput.value.trim();
  if (!input) return;

  generateConsultBtn.disabled = true;
  consultDisplay.innerHTML = '<div class="loading">Generating...</div>';

  try {
    const token = localStorage.getItem('auth_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch('/api/consult', {
      method: 'POST',
      headers,
      body: JSON.stringify({ text: input, mode: outputTypeSelect.value })
    });

    const data = await res.json();

    if (data.answer) {
      const isStructured = detectStructuredResponse(data.answer);
      if (isStructured) {
        const sections = parseStructuredResponse(data.answer);
        consultDisplay.innerHTML = renderStructuredResponse(sections);
      } else {
        consultDisplay.innerHTML = renderSimpleResponse(data.answer);
      }
      copyConsultBtn.disabled = false;
      saveConsultBtn.disabled = false;
    } else {
      consultDisplay.innerHTML = `<div class="error">${data.error || 'Generation failed'}</div>`;
    }
  } catch (e) {
    consultDisplay.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  } finally {
    generateConsultBtn.disabled = false;
  }
}

generateConsultBtn.addEventListener('click', generateConsult);
consultInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generateConsult();
  }
});

copyConsultBtn.addEventListener('click', () => {
  const text = consultDisplay.innerText;
  navigator.clipboard.writeText(text);
  alert('Copied!');
});

// ===== Save/Load from localStorage =====
function saveSavedItem(type, label, content) {
  const key = `saved_${type}`;
  const list = JSON.parse(localStorage.getItem(key) || '[]');
  list.unshift({ id: Date.now(), label, content });
  localStorage.setItem(key, JSON.stringify(list.slice(0, 50)));
  renderSidebarItems();
}

saveAnswerBtn.addEventListener('click', () => {
  saveSavedItem('questions', clinicalInput.value.substring(0, 50), answerDisplay.innerText);
});

saveConsultBtn.addEventListener('click', () => {
  saveSavedItem('consults', consultInput.value.substring(0, 50), consultDisplay.innerText);
});

function renderSidebarItems() {
  const questions = JSON.parse(localStorage.getItem('saved_questions') || '[]');
  const consults = JSON.parse(localStorage.getItem('saved_consults') || '[]');

  const qContainer = document.getElementById('savedQuestions');
  qContainer.innerHTML = questions.length ? questions.map(q => `
    <div class="saved-item" onclick="document.getElementById('clinicalInput').value='${q.label}'; document.getElementById('clinicalInput').focus();">
      <span>${q.label}</span>
      <button onclick="event.stopPropagation(); deleteSaved('saved_questions', ${q.id});" class="btn-delete">×</button>
    </div>
  `).join('') : '<div class="empty">No saved questions</div>';

  const cContainer = document.getElementById('savedConsults');
  cContainer.innerHTML = consults.length ? consults.map(c => `
    <div class="saved-item" onclick="document.getElementById('consultInput').value='${c.label}'; document.getElementById('consultInput').focus();">
      <span>${c.label}</span>
      <button onclick="event.stopPropagation(); deleteSaved('saved_consults', ${c.id});" class="btn-delete">×</button>
    </div>
  `).join('') : '<div class="empty">No saved consults</div>';
}

window.deleteSaved = function(key, id) {
  const list = JSON.parse(localStorage.getItem(key) || '[]');
  const filtered = list.filter(x => x.id !== id);
  localStorage.setItem(key, JSON.stringify(filtered));
  renderSidebarItems();
};

renderSidebarItems();
</script>

</body>
</html>
