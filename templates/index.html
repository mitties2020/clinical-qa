<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VividMedi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=config['VERSION']) }}">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
<div class="app-root">
<div class="shell">
<div class="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="brand-title">VividMedi</div>
    <input id="sidebarSearch" class="topic-search" type="text" placeholder="Search saved..." />
  </div>

  <div class="sidebar-subhead">Saved Clinical Questions</div>
  <div id="savedQuestionsList" class="conversation-list"></div>

  <div class="sidebar-subhead">Consultation Notes</div>
  <div id="savedWrList" class="conversation-list"></div>

  <div class="sidebar-subhead">Handovers</div>
  <div id="savedHandoverList" class="conversation-list"></div>
</aside>

<!-- ================= MAIN ================= -->
<div class="main-region">

<header class="header">
  <h1 class="brand-header__name">VividMedi</h1>
  <div id="gSignIn"></div>
</header>

<main>

<div class="grid">

<!-- ========= CLINICAL QUESTION ========= -->
<section class="card">
  <label class="label">Clinical</label>

  <textarea id="clinicalQuestion" class="textarea" rows="7"></textarea>

  <div class="actions">
    <button id="generateBtn" class="btn btn-primary">Generate</button>
  </div>

  <div id="qStatus" class="mic-status"></div>
</section>

<!-- ========= ANSWER ========= -->
<section class="card">
  <div class="output-header">
    <h2>Answer</h2>
    <button id="copyAllBtn" class="btn" disabled>Copy</button>
  </div>

  <div id="answerLoader" class="hidden">Generating…</div>
  <div id="answer" class="answer">Your answer will appear here.</div>
</section>

</div>

<!-- ========= CONSULTATION ========= -->
<section class="card wr-card">

  <div class="wr-head">
    <div class="label">Consultation Notes</div>

    <div class="actions">
      <button id="consultGenerateBtn" class="btn btn-primary">Generate</button>
      <span id="wrAnswerLoader" class="hidden">Generating…</span>
    </div>
  </div>

  <textarea id="wrNote" class="textarea" rows="10"></textarea>
  <div id="wrStatus" class="mic-status"></div>

  <div class="divider-spacer"></div>

  <div class="label">Consult Output</div>
  <textarea id="wrOutput" class="textarea" rows="10"></textarea>

</section>

</main>

</div>
</div>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

const clinicalQuestion = document.getElementById("clinicalQuestion");
const generateBtn = document.getElementById("generateBtn");
const answerEl = document.getElementById("answer");
const answerLoader = document.getElementById("answerLoader");
const copyAllBtn = document.getElementById("copyAllBtn");

const wrNote = document.getElementById("wrNote");
const wrOutput = document.getElementById("wrOutput");
const consultGenerateBtn = document.getElementById("consultGenerateBtn");
const wrAnswerLoader = document.getElementById("wrAnswerLoader");

const qStatus = document.getElementById("qStatus");
const wrStatus = document.getElementById("wrStatus");

function flash(el,msg){ if(el) el.textContent = msg }

async function generateClinical() {
  const input = (clinicalQuestion.value || "").trim();
  if (!input) return;

  generateBtn.disabled = true;
  answerLoader.classList.remove("hidden");

  try {
    const res = await fetch("/api/clinical", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ text: input })
    });

    const data = await res.json();

    if (data.answer){
      answerEl.innerText = data.answer;
      copyAllBtn.disabled = false;
    } else {
      answerEl.innerText = data.error || "Generate failed.";
    }

  } catch(e){
    answerEl.innerText = "Generate error.";
  } finally {
    answerLoader.classList.add("hidden");
    generateBtn.disabled = false;
  }
}

async function generateConsult() {
  const input = (wrNote.value || "").trim();
  if (!input) return;

  consultGenerateBtn.disabled = true;
  wrAnswerLoader.classList.remove("hidden");

  try {
    const res = await fetch("/api/consult", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ text: input })
    });

    const data = await res.json();

    if (data.answer){
      wrOutput.value = data.answer;
    } else {
      wrOutput.value = data.error || "Generate failed.";
    }

  } catch(e){
    wrOutput.value = "Generate error.";
  } finally {
    wrAnswerLoader.classList.add("hidden");
    consultGenerateBtn.disabled = false;
  }
}

generateBtn.addEventListener("click", generateClinical);
consultGenerateBtn.addEventListener("click", generateConsult);

clinicalQuestion.addEventListener("keydown", (e)=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    generateClinical();
  }
});

wrNote.addEventListener("keydown",(e)=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    generateConsult();
  }
});

copyAllBtn.addEventListener("click", async ()=>{
  await navigator.clipboard.writeText(answerEl.innerText || "");
});

});
</script>

</body>
</html>
