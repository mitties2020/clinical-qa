<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VividMedi - Clinical AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body data-theme="dark">
<div class="app-container">
  
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo-section">
        <svg class="vm-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="vmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#33e6a6;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="45" fill="none" stroke="url(#vmGrad)" stroke-width="2" opacity="0.3"/>
          <circle cx="50" cy="50" r="35" fill="none" stroke="url(#vmGrad)" stroke-width="1.5" opacity="0.5"/>
          <path d="M 50 25 L 65 50 L 50 75 L 35 50 Z" fill="url(#vmGrad)" opacity="0.8"/>
          <circle cx="50" cy="50" r="8" fill="url(#vmGrad)"/>
        </svg>
        <div class="brand-name">VividMedi</div>
      </div>

      <input class="search-input" type="text" id="sidebarSearch" placeholder="Search saved..." />
    </div>

    <!-- Saved items sections -->
    <div class="sidebar-section">
      <div class="section-title">Clinical Questions</div>
      <div class="saved-items" id="savedQuestions"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Consultation Data</div>
      <div class="saved-items" id="savedConsults"></div>
    </div>

    <!-- User info at bottom -->
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-email">michael.addis101@gmail.com</div>
        <div class="user-plan">PRO • Unlimited</div>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main-container">
    <header class="header">
      <h1 class="header-title">VividMedi</h1>
      <div class="header-controls">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </header>

    <main class="workspace">
      <!-- ===== CLINICAL QUESTION SECTION ===== -->
      <section class="card clinical-card">
        <div class="card-header">
          <h2>Clinical Question</h2>
          <button class="btn-small" id="clearClinicalBtn" title="Clear input">✕</button>
        </div>
        <textarea id="clinicalInput" class="input-field" placeholder="Paste clinical notes, exam findings, or ask a question..." rows="8"></textarea>
        <div class="card-actions">
          <button class="btn-primary" id="generateClinicalBtn">Generate</button>
          <div class="status-text" id="clinicalStatus"></div>
        </div>
      </section>

      <!-- ===== ANSWER SECTION ===== -->
      <section class="card answer-card">
        <div class="card-header">
          <h2>Answer</h2>
          <div class="answer-controls">
            <button class="btn-small" id="saveAnswerBtn" title="Save this answer">💾</button>
            <button class="btn-small" id="copyAllAnswerBtn" title="Copy all">📋</button>
          </div>
        </div>

        <div class="answer-sections" id="answerSections">
          <!-- Populated dynamically -->
        </div>

        <div class="answer-placeholder" id="answerPlaceholder">
          Generate an answer to see structured sections here
        </div>
      </section>

      <!-- ===== CONSULTATION DATA SECTION ===== -->
      <section class="card consult-card">
        <div class="card-header">
          <h2>Consult Data Input</h2>
          <button class="btn-small" id="clearConsultBtn" title="Clear input">✕</button>
        </div>

        <!-- Device selector -->
        <div class="control-row">
          <div class="control-group">
            <label class="control-label">Smart Device</label>
            <select id="deviceSelect" class="control-select">
              <option value="">Connect Smart Device</option>
              <option value="glasses">AI Glasses</option>
              <option value="ring">AI Ring</option>
              <option value="watch">Smart Watch</option>
              <option value="headset">Headset</option>
            </select>
          </div>
        </div>

        <textarea id="consultInput" class="input-field" placeholder="Paste raw dictation or consultation notes..." rows="8"></textarea>
        <div class="card-actions">
          <button class="btn-primary" id="generateConsultBtn">Generate</button>
          <div class="status-text" id="consultStatus"></div>
        </div>

        <!-- Output type selector -->
        <div class="divider"></div>
        <div class="control-row">
          <div class="control-group">
            <label class="control-label">Output Type</label>
            <select id="outputTypeSelect" class="control-select">
              <option value="consult_note">Initial Consultation</option>
              <option value="medical_review">Medical Review</option>
              <option value="discharge">Discharge Summary</option>
              <option value="referral">Referral Letter</option>
              <option value="dva">DVA Assessment</option>
              <option value="handover">Handover Note</option>
            </select>
          </div>
        </div>

        <div class="consult-output-label">Output</div>
        <textarea id="consultOutput" class="output-field" readonly rows="10"></textarea>
        <div class="card-actions">
          <button class="btn-small" id="saveConsultBtn" title="Save this output">💾</button>
          <button class="btn-small" id="copyConsultBtn" title="Copy output">📋</button>
          <button class="btn-small" id="clearConsultOutputBtn" title="Clear output">✕</button>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
// ===== Theme Toggle =====
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

themeToggle.addEventListener('click', () => {
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
});

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', savedTheme);

// ===== Logout =====
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', { method: 'POST' });
  localStorage.removeItem('auth_token');
  window.location.reload();
});

// ===== Clinical Question =====
const clinicalInput = document.getElementById('clinicalInput');
const generateClinicalBtn = document.getElementById('generateClinicalBtn');
const clearClinicalBtn = document.getElementById('clearClinicalBtn');
const answerSections = document.getElementById('answerSections');
const answerPlaceholder = document.getElementById('answerPlaceholder');
const saveAnswerBtn = document.getElementById('saveAnswerBtn');
const copyAllAnswerBtn = document.getElementById('copyAllAnswerBtn');

clearClinicalBtn.addEventListener('click', () => {
  clinicalInput.value = '';
  answerSections.innerHTML = '';
  answerPlaceholder.style.display = 'block';
  saveAnswerBtn.disabled = true;
});

generateClinicalBtn.addEventListener('click', async () => {
  const input = clinicalInput.value.trim();
  if (!input) {
    alert('Please enter a clinical question');
    return;
  }

  generateClinicalBtn.disabled = true;
  answerPlaceholder.style.display = 'block';
  answerSections.innerHTML = '<div class="loading">Generating...</div>';

  try {
    const token = localStorage.getItem('auth_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers,
      body: JSON.stringify({ query: input, mode: 'clinical' })
    });

    const data = await res.json();

    if (data.answer) {
      displayAnswer(data.answer);
      answerPlaceholder.style.display = 'none';
      saveAnswerBtn.disabled = false;
    } else {
      answerSections.innerHTML = `<div class="error">${data.error || 'Generation failed'}</div>`;
    }
  } catch (e) {
    answerSections.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  } finally {
    generateClinicalBtn.disabled = false;
  }
});

function displayAnswer(text) {
  const sections = parseAnswerSections(text);
  answerSections.innerHTML = sections.map(section => `
    <div class="answer-section">
      <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="section-title">${section.title}</span>
        <span class="expand-icon">▼</span>
        <button class="btn-tiny" onclick="copySection(event, '${section.title}')">📋</button>
      </div>
      <div class="section-content">${section.content}</div>
    </div>
  `).join('');
}

function parseAnswerSections(text) {
  const titles = ['Summary', 'Assessment', 'Diagnosis', 'Investigations', 'Treatment', 'Monitoring', 'Follow-up & Safety Netting', 'Red Flags', 'References'];
  const sections = [];

  let current = text;
  for (let title of titles) {
    const regex = new RegExp(`(${title})[\\s\\n]*([^]*?)(?=\\n(?:${titles.join('|')})\\b|$)`, 'i');
    const match = current.match(regex);
    if (match) {
      const content = match[2].trim();
      sections.push({ title: match[1], content: `<pre>${content}</pre>` });
      current = current.substring(match.index + match[0].length);
    }
  }

  if (sections.length === 0) {
    sections.push({ title: 'Response', content: `<pre>${text}</pre>` });
  }

  return sections;
}

function copySection(e, title) {
  e.stopPropagation();
  const section = e.target.closest('.answer-section');
  const content = section.querySelector('.section-content').textContent;
  navigator.clipboard.writeText(content);
  alert('Copied!');
}

copyAllAnswerBtn.addEventListener('click', () => {
  const allText = Array.from(answerSections.querySelectorAll('.section-content'))
    .map(el => el.textContent)
    .join('\n\n');
  navigator.clipboard.writeText(allText);
  alert('All sections copied!');
});

// ===== Consultation Data =====
const consultInput = document.getElementById('consultInput');
const generateConsultBtn = document.getElementById('generateConsultBtn');
const clearConsultBtn = document.getElementById('clearConsultBtn');
const consultOutput = document.getElementById('consultOutput');
const outputTypeSelect = document.getElementById('outputTypeSelect');
const saveConsultBtn = document.getElementById('saveConsultBtn');
const copyConsultBtn = document.getElementById('copyConsultBtn');
const clearConsultOutputBtn = document.getElementById('clearConsultOutputBtn');

clearConsultBtn.addEventListener('click', () => {
  consultInput.value = '';
});

clearConsultOutputBtn.addEventListener('click', () => {
  consultOutput.value = '';
});

generateConsultBtn.addEventListener('click', async () => {
  const input = consultInput.value.trim();
  if (!input) {
    alert('Please enter consultation data');
    return;
  }

  generateConsultBtn.disabled = true;
  consultOutput.value = 'Generating...';

  try {
    const token = localStorage.getItem('auth_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch('/api/consult', {
      method: 'POST',
      headers,
      body: JSON.stringify({ text: input, mode: outputTypeSelect.value })
    });

    const data = await res.json();

    if (data.answer) {
      consultOutput.value = data.answer;
      saveConsultBtn.disabled = false;
    } else {
      consultOutput.value = data.error || 'Generation failed';
    }
  } catch (e) {
    consultOutput.value = `Error: ${e.message}`;
  } finally {
    generateConsultBtn.disabled = false;
  }
});

copyConsultBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(consultOutput.value);
  alert('Copied!');
});

// ===== Save functionality =====
saveAnswerBtn.addEventListener('click', () => {
  const text = clinicalInput.value;
  if (!text) return;
  addSavedItem('questions', text.substring(0, 50) + '...');
});

saveConsultBtn.addEventListener('click', () => {
  const text = consultOutput.value;
  if (!text) return;
  addSavedItem('consults', text.substring(0, 50) + '...');
});

function addSavedItem(type, label) {
  const container = document.getElementById(type === 'questions' ? 'savedQuestions' : 'savedConsults');
  const item = document.createElement('div');
  item.className = 'saved-item';
  item.innerHTML = `
    <span>${label}</span>
    <button class="btn-delete">×</button>
  `;
  item.querySelector('.btn-delete').addEventListener('click', () => item.remove());
  container.appendChild(item);
}
</script>

</body>
</html>
