<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VividMedi - Clinical AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body data-theme="dark">
<div class="app-container">
  
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo-section">
        <div class="vm-logo-icon">▲</div>
        <div class="brand-name">VividMedi</div>
      </div>
      <input class="search-input" type="text" id="sidebarSearch" placeholder="Search saved..." />
    </div>

    <div class="sidebar-section">
      <div class="section-title">Clinical Questions</div>
      <div class="saved-items" id="savedQuestions"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Consultation Data</div>
      <div class="saved-items" id="savedConsults"></div>
    </div>

    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-email">michael.addis101@gmail.com</div>
        <div class="user-plan">PRO • Unlimited</div>
      </div>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main-container">
    <header class="header">
      <h1 class="header-title">VividMedi</h1>
      <div class="header-controls">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="workspace">
      <!-- ===== CLINICAL QUESTION SECTION ===== -->
      <section class="card clinical-card">
        <div class="card-header">
          <h2>Clinical Question</h2>
          <button class="btn-icon" id="clearClinicalBtn" title="Clear">✕</button>
        </div>
        <textarea id="clinicalInput" class="input-field" placeholder="Paste clinical notes, exam findings, or ask a question..." rows="9"></textarea>
        <div class="card-actions">
          <button class="btn-primary" id="generateClinicalBtn">
            <span class="btn-text">Generate</span>
            <span class="btn-hint">Enter ⏎</span>
          </button>
          <div class="status-indicator" id="clinicalStatus"></div>
        </div>
      </section>

      <!-- ===== ANSWER SECTION ===== -->
      <section class="card answer-card">
        <div class="card-header">
          <h2>Answer</h2>
          <div class="answer-controls">
            <button class="btn-icon" id="copyAllAnswerBtn" title="Copy all">📋</button>
            <button class="btn-icon" id="saveAnswerBtn" title="Save">💾</button>
          </div>
        </div>

        <div class="answer-container">
          <div class="answer-placeholder" id="answerPlaceholder">
            Generate an answer to see results here
          </div>
          <div class="answer-content" id="answerContent"></div>
        </div>
      </section>

      <!-- ===== CONSULTATION DATA SECTION ===== -->
      <section class="card consult-card">
        <div class="card-header">
          <h2>Consult Data Input</h2>
          <button class="btn-icon" id="clearConsultBtn" title="Clear">✕</button>
        </div>

        <div class="control-row">
          <div class="control-group">
            <label class="control-label">Smart Device</label>
            <select id="deviceSelect" class="control-select">
              <option value="">Connect Smart Device</option>
              <option value="glasses">AI Glasses</option>
              <option value="ring">AI Ring</option>
              <option value="watch">Smart Watch</option>
              <option value="headset">Headset</option>
            </select>
          </div>
        </div>

        <textarea id="consultInput" class="input-field" placeholder="Paste raw dictation or consultation notes..." rows="9"></textarea>
        
        <div class="card-actions">
          <button class="btn-primary" id="generateConsultBtn">
            <span class="btn-text">Generate</span>
            <span class="btn-hint">Enter ⏎</span>
          </button>
          <div class="status-indicator" id="consultStatus"></div>
        </div>

        <div class="divider"></div>

        <div class="control-row">
          <div class="control-group">
            <label class="control-label">Output Type</label>
            <select id="outputTypeSelect" class="control-select">
              <option value="consult_note">Initial Consultation</option>
              <option value="medical_review">Medical Review</option>
              <option value="discharge">Discharge Summary</option>
              <option value="referral">Referral Letter</option>
              <option value="dva">DVA Assessment</option>
              <option value="handover">Handover Note</option>
            </select>
          </div>
        </div>

        <div class="consult-output-container">
          <div class="consult-output-label">Output</div>
          <div class="answer-sections" id="consultSections">
            <div class="output-placeholder">Output will appear here</div>
          </div>
        </div>

        <div class="card-actions">
          <button class="btn-small" id="copyConsultBtn" title="Copy">📋 Copy</button>
          <button class="btn-small" id="clearConsultOutputBtn" title="Clear">✕ Clear</button>
          <button class="btn-small" id="saveConsultBtn" title="Save">💾 Save</button>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
// ===== Theme Toggle =====
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

themeToggle.addEventListener('click', () => {
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
});

const savedTheme = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', savedTheme);

// ===== Logout =====
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', { method: 'POST' });
  localStorage.removeItem('auth_token');
  window.location.reload();
});

// ===== Helper: Detect if response is structured or simple =====
function isStructuredResponse(text) {
  const structuredKeywords = ['Summary', 'Assessment', 'Diagnosis', 'Investigation', 'Treatment', 'Monitoring', 'Follow-up'];
  return structuredKeywords.some(keyword => text.includes(keyword));
}

// ===== Parse Answer Sections =====
function parseAnswerSections(text) {
  const keywords = ['Summary', 'Assessment', 'Diagnosis', 'Investigation', 'Treatment', 'Monitoring', 'Follow-up', 'Red Flag', 'Reference'];
  const sections = [];
  
  let remaining = text;
  for (let keyword of keywords) {
    const regex = new RegExp(`\\*\\*${keyword}\\*\\*(.+?)(?=\\*\\*|$)`, 'is');
    const match = remaining.match(regex);
    if (match) {
      const content = match[1].trim().replace(/^\*\*/g, '').replace(/\*\*$/g, '');
      if (content) {
        sections.push({
          title: keyword,
          content: content
        });
      }
    }
  }
  
  return sections;
}

// ===== Display Answer =====
function displayAnswer(text) {
  const answerContent = document.getElementById('answerContent');
  const answerPlaceholder = document.getElementById('answerPlaceholder');
  
  const isStructured = isStructuredResponse(text);
  
  if (isStructured) {
    const sections = parseAnswerSections(text);
    if (sections.length > 0) {
      answerPlaceholder.style.display = 'none';
      answerContent.innerHTML = sections.map((section, idx) => `
        <div class="answer-section" data-index="${idx}">
          <div class="section-header">
            <span class="section-title">${section.title}</span>
            <span class="section-controls">
              <button class="btn-section-copy" onclick="copySectionContent(${idx})">📋</button>
              <span class="expand-icon">▼</span>
            </span>
          </div>
          <div class="section-content">
            <div class="content-text">${section.content.replace(/\n/g, '<br>')}</div>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.section-header').forEach(header => {
        header.addEventListener('click', () => {
          header.closest('.answer-section').classList.toggle('open');
        });
      });
      return;
    }
  }
  
  // Simple response (not structured)
  answerPlaceholder.style.display = 'none';
  answerContent.innerHTML = `
    <div class="answer-simple">
      <div class="simple-content">${text.replace(/\n/g, '<br>')}</div>
    </div>
  `;
}

function copySectionContent(idx) {
  const section = document.querySelector(`[data-index="${idx}"] .content-text`);
  if (section) {
    const text = section.textContent;
    navigator.clipboard.writeText(text);
    alert('Copied!');
  }
}

// ===== Clinical Question =====
const clinicalInput = document.getElementById('clinicalInput');
const generateClinicalBtn = document.getElementById('generateClinicalBtn');
const clearClinicalBtn = document.getElementById('clearClinicalBtn');
const answerContent = document.getElementById('answerContent');
const answerPlaceholder = document.getElementById('answerPlaceholder');
const saveAnswerBtn = document.getElementById('saveAnswerBtn');
const copyAllAnswerBtn = document.getElementById('copyAllAnswerBtn');

clearClinicalBtn.addEventListener('click', () => {
  clinicalInput.value = '';
  answerContent.innerHTML = '';
  answerPlaceholder.style.display = 'block';
});

generateClinicalBtn.addEventListener('click', generateClinical);

// Enter key support
clinicalInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generateClinical();
  }
});

async function generateClinical() {
  const input = clinicalInput.value.trim();
  if (!input) {
    alert('Please enter a clinical question');
    return;
  }

  generateClinicalBtn.disabled = true;
  answerPlaceholder.style.display = 'block';
  answerContent.innerHTML = '';

  try {
    const token = localStorage.getItem('auth_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers,
      body: JSON.stringify({ query: input, mode: 'clinical' })
    });

    const data = await res.json();

    if (data.answer) {
      displayAnswer(data.answer);
      saveAnswerBtn.disabled = false;
    } else {
      answerContent.innerHTML = `<div class="error">${data.error || 'Generation failed'}</div>`;
      answerPlaceholder.style.display = 'none';
    }
  } catch (e) {
    answerContent.innerHTML = `<div class="error">Error: ${e.message}</div>`;
    answerPlaceholder.style.display = 'none';
  } finally {
    generateClinicalBtn.disabled = false;
  }
}

copyAllAnswerBtn.addEventListener('click', () => {
  const allText = document.querySelectorAll('.content-text');
  const combined = Array.from(allText).map(el => el.textContent).join('\n\n');
  navigator.clipboard.writeText(combined);
  alert('Copied!');
});

// ===== Consultation Data =====
const consultInput = document.getElementById('consultInput');
const generateConsultBtn = document.getElementById('generateConsultBtn');
const clearConsultBtn = document.getElementById('clearConsultBtn');
const consultSections = document.getElementById('consultSections');
const outputTypeSelect = document.getElementById('outputTypeSelect');
const saveConsultBtn = document.getElementById('saveConsultBtn');
const copyConsultBtn = document.getElementById('copyConsultBtn');
const clearConsultOutputBtn = document.getElementById('clearConsultOutputBtn');

clearConsultBtn.addEventListener('click', () => {
  consultInput.value = '';
});

clearConsultOutputBtn.addEventListener('click', () => {
  consultSections.innerHTML = '<div class="output-placeholder">Output will appear here</div>';
});

generateConsultBtn.addEventListener('click', generateConsult);

consultInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generateConsult();
  }
});

async function generateConsult() {
  const input = consultInput.value.trim();
  if (!input) {
    alert('Please enter consultation data');
    return;
  }

  generateConsultBtn.disabled = true;
  consultSections.innerHTML = '<div class="loading">Generating...</div>';

  try {
    const token = localStorage.getItem('auth_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch('/api/consult', {
      method: 'POST',
      headers,
      body: JSON.stringify({ text: input, mode: outputTypeSelect.value })
    });

    const data = await res.json();

    if (data.answer) {
      const isStructured = isStructuredResponse(data.answer);
      if (isStructured) {
        const sections = parseAnswerSections(data.answer);
        if (sections.length > 0) {
          consultSections.innerHTML = sections.map((section, idx) => `
            <div class="answer-section" data-index="${idx}">
              <div class="section-header">
                <span class="section-title">${section.title}</span>
                <span class="section-controls">
                  <button class="btn-section-copy" onclick="copyConsultSection(${idx})">📋</button>
                  <span class="expand-icon">▼</span>
                </span>
              </div>
              <div class="section-content">
                <div class="content-text">${section.content.replace(/\n/g, '<br>')}</div>
              </div>
            </div>
          `).join('');
          
          document.querySelectorAll('.section-header').forEach(header => {
            header.addEventListener('click', () => {
              header.closest('.answer-section').classList.toggle('open');
            });
          });
          return;
        }
      }
      
      consultSections.innerHTML = `
        <div class="answer-simple">
          <div class="simple-content">${data.answer.replace(/\n/g, '<br>')}</div>
        </div>
      `;
      saveConsultBtn.disabled = false;
    } else {
      consultSections.innerHTML = `<div class="error">${data.error || 'Generation failed'}</div>`;
    }
  } catch (e) {
    consultSections.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  } finally {
    generateConsultBtn.disabled = false;
  }
}

function copyConsultSection(idx) {
  const section = document.querySelector(`[data-index="${idx}"] .content-text`);
  if (section) {
    const text = section.textContent;
    navigator.clipboard.writeText(text);
    alert('Copied!');
  }
}

copyConsultBtn.addEventListener('click', () => {
  const allText = document.querySelectorAll('#consultSections .content-text');
  const combined = Array.from(allText).map(el => el.textContent).join('\n\n');
  navigator.clipboard.writeText(combined);
  alert('Copied!');
});

// ===== Save functionality =====
saveAnswerBtn.addEventListener('click', () => {
  const text = clinicalInput.value;
  if (!text) return;
  addSavedItem('questions', text.substring(0, 40) + '...');
});

saveConsultBtn.addEventListener('click', () => {
  const text = Array.from(document.querySelectorAll('#consultSections .content-text')).map(el => el.textContent).join(' ');
  if (!text) return;
  addSavedItem('consults', text.substring(0, 40) + '...');
});

function addSavedItem(type, label) {
  const container = document.getElementById(type === 'questions' ? 'savedQuestions' : 'savedConsults');
  const item = document.createElement('div');
  item.className = 'saved-item';
  item.innerHTML = `
    <span>${label}</span>
    <button class="btn-delete">×</button>
  `;
  item.querySelector('.btn-delete').addEventListener('click', () => item.remove());
  container.appendChild(item);
}
</script>

</body>
</html>
