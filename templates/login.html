<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VividMedi Access</title>
    <style>
        :root {
            --bg1: #050714;
            --bg2: #0c1025;
            --line: rgba(255,255,255,0.25);
            --text: #f6f7ff;
            --muted: #b8bfd8;
            --panel: rgba(20, 26, 46, 0.7);
            --btn: #2a3148;
            --btn-hover: #36405f;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18) 1px, transparent 1px) 0 0/120px 120px,
                radial-gradient(circle at 50% 70%, rgba(255,255,255,0.12) 1px, transparent 1px) 0 0/160px 160px,
                linear-gradient(180deg, var(--bg2), var(--bg1) 45%, #000 100%);
        }
        .hero {
            height: 260px;
            border-bottom: 1px solid var(--line);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(680px, 92vw);
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
        }
        h1 { margin: 0 0 18px; font-size: 34px; font-weight: 800; letter-spacing: .3px; }
        .brand-logo{width:min(280px,85%);display:block;margin:0 auto 14px;opacity:.92;object-fit:contain}
        label { display: block; color: var(--muted); margin-bottom: 12px; font-size: 20px; }
        .row { display: flex; gap: 8px; }
        input {
            flex: 1;
            background: rgba(255,255,255,0.04);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 18px;
            outline: none;
        }
        button {
            background: var(--btn);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 0 24px;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { background: var(--btn-hover); }
        #msg { margin-top: 12px; color: #ffb5b5; min-height: 20px; }
    </style>
</head>
<body>
    <section class="hero">
        <div class="card">
            <img class="brand-logo" src="/static/header.png" alt="VividMedi logo">
            <h1>Secure Access</h1>
            <label for="code">Enter Access Code</label>
            <div class="row">
                <input id="code" type="password" placeholder="Access Code" autocomplete="one-time-code">
                <button id="loginBtn">LOGIN</button>
            </div>
            <div style="margin-top:8px;color:#b8bfd8;font-size:13px">Use code: 931986</div><div id="msg"></div>
        </div>
    </section>

    <script>
        const codeEl = document.getElementById("code");
        const msgEl = document.getElementById("msg");
        const loginBtn = document.getElementById("loginBtn");

        async function doLogin() {
            msgEl.textContent = "";
            const code = codeEl.value.trim();
            if (!code) {
                msgEl.textContent = "Please enter access code.";
                return;
            }
            const res = await fetch("/authenticate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code })
            });
            const data = await res.json();
            if (!res.ok || !data.ok) {
                msgEl.textContent = data.error || "Access denied.";
                return;
            }
            window.location.href = "/";
        }

        loginBtn.addEventListener("click", doLogin);
        codeEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter") doLogin();
        });
    </script>
</body>
</html>
