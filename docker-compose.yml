version: '3.9'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 0
      PYTHONUNBUFFERED: 1
      PORT: 5000
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: deepseek-chat
      WHISPER_MODEL_SIZE: tiny
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID_PRO: ${STRIPE_PRICE_ID_PRO}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      APP_BASE_URL: http://localhost:5000
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret-change-me}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-secret-change-me}
    volumes:
      - ./app.py:/app/app.py
      - ./templates:/app/templates
      - ./static:/app/static
      - ./requirements.txt:/app/requirements.txt
    develop:
      watch:
        - path: ./app.py
          action: restart
        - path: ./templates
          action: sync
        - path: ./static
          action: sync
    command: gunicorn app:app --bind 0.0.0.0:5000 --reload --workers 1 --timeout 180
